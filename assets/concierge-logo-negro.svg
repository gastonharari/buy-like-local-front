<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 90" width="1260" height="270">
  <rect width="420" height="90" fill="#0D0D0D"/>
  <!-- Pin -->
  <path d="M 32 4 C 14 4, 4 16, 4 28 C 4 42, 16 52, 26 62 C 28 65, 30 68, 32 71 C 34 68, 36 65, 38 62 C 48 52, 60 42, 60 28 C 60 16, 50 4, 32 4 Z" fill="#D4A574"/>
  <!-- Keyhole bow -->
  <circle cx="32" cy="25" r="10" fill="none" stroke="#0D0D0D" stroke-width="3"/>
  <circle cx="32" cy="25" r="4" fill="#0D0D0D"/>
  <!-- Keyhole shaft + bits -->
  <line x1="32" y1="35" x2="32" y2="45" stroke="#0D0D0D" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="41" x2="32" y2="41" stroke="#0D0D0D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="45" x2="32" y2="45" stroke="#0D0D0D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="76" y="44" fill="#F5EFE6" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" font-size="34" font-weight="500" letter-spacing="0.5">Concierge</text>
  <!-- Tagline: textLength forces it to span exactly from C to end of g -->
  <text x="76" y="62" fill="#4a7070" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" font-size="9.5" font-weight="300" textLength="232" lengthAdjust="spacing">BUENOS AIRES</text>
</svg>